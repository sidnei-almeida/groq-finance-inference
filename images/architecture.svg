<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-label="Architecture layers">
  <defs>
    <linearGradient id="c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="960" height="280" fill="#020617"/>
  <text x="480" y="36" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Request flow</text>
  <!-- row 1 -->
  <rect x="60" y="55" width="200" height="70" rx="10" fill="url(#c)" stroke="#334155" filter="url(#s)"/>
  <text x="160" y="88" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Client / Dashboard</text>
  <text x="160" y="108" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">HTTPS Ě CORS</text>
  <text x="285" y="98" fill="#475569" font-size="20">ĺ</text>
  <rect x="310" y="55" width="200" height="70" rx="10" fill="url(#c)" stroke="#38bdf8" stroke-width="1.5" filter="url(#s)"/>
  <text x="410" y="88" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="14" font-weight="700">FastAPI</text>
  <text x="410" y="108" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Routes Ě JWT Ě /api/*</text>
  <text x="535" y="98" fill="#475569" font-size="20">ĺ</text>
  <rect x="560" y="55" width="340" height="70" rx="10" fill="url(#c)" stroke="#475569" filter="url(#s)"/>
  <text x="730" y="85" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Services layer</text>
  <text x="730" y="105" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10">quant_engine Ě AtlasAgent(Groq) Ě paper_trading Ě auth Ě DB</text>
  <!-- row 2 -->
  <rect x="60" y="165" width="280" height="70" rx="10" fill="url(#c)" stroke="#6366f1" stroke-width="1.5" filter="url(#s)"/>
  <text x="200" y="195" text-anchor="middle" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="14" font-weight="700">PostgreSQL</text>
  <text x="200" y="215" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Analyses Ě users Ě paper_* tables</text>
  <rect x="380" y="165" width="240" height="70" rx="10" fill="url(#c)" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)"/>
  <text x="500" y="195" text-anchor="middle" fill="#fcd34d" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Market data</text>
  <text x="500" y="215" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">yfinance (prices)</text>
  <rect x="660" y="165" width="240" height="70" rx="10" fill="url(#c)" stroke="#22c55e" stroke-width="1.5" filter="url(#s)"/>
  <text x="780" y="195" text-anchor="middle" fill="#86efac" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Groq LPU</text>
  <text x="780" y="215" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Llama 3.3 Ě Atlas reports</text>
  <!-- connectors -->
  <path d="M 410 125 L 410 140 L 200 140 L 200 165" stroke="#475569" fill="none" stroke-width="1.5"/>
  <path d="M 410 125 L 410 140 L 500 140 L 500 165" stroke="#475569" fill="none" stroke-width="1.5"/>
  <path d="M 730 125 L 730 140 L 780 140 L 780 165" stroke="#475569" fill="none" stroke-width="1.5"/>
</svg>
